<div class="menu-container">
  <button class="audio-toggle-btn" (click)="toggleAudio()">
    <svg *ngIf="!audioService.isMuted" viewBox="0 0 24 24" class="audio-icon">
      <path
        d="M5 17h3l5 5V2l-5 5H5v10zm11-5c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"
      />
    </svg>

    <svg *ngIf="audioService.isMuted" viewBox="0 0 24 24" class="audio-icon">
      <path
        d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"
      />
    </svg>
  </button>
  <div class="particles-container">
    <div *ngFor="let p of particles" class="particle" [ngStyle]="p.style"></div>
  </div>
  <div
    class="intro-overlay"
    *ngIf="!hideOverlayDOM"
    [ngClass]="{ 'fade-out-overlay': !showOverlay }"
  >
    <div class="glow-effect">
      <button class="magic-circle-btn" (click)="startIntroSequence()"></button>
    </div>
  </div>
  <div class="menu-header">
    <h1>Harry Potter Escape Room</h1>
    <h2>Il tranello del diavolo</h2>
  </div>
  <div
    class="introGame"
    *ngIf="!showInsertName"
    [ngClass]="{ 'parchment-open': isParchmentOpen }"
  >
    <p class="typewriter-text">{{ displayedText }}</p>
    <button
      *ngIf="isTextWritingComplete()"
      (click)="registration()"
      class="btn-registration"
    >
      ▶
    </button>
  </div>
  <div class="registration-box" *ngIf="showInsertName">
    <p class="form-title">Scrivi il tuo nome, giovane mago:</p>
    <input
      type="text"
      name="wizardName"
      [(ngModel)]="wizardName"
      [ngModelOptions]="{ standalone: true }"
      placeholder="Inserisci il tuo nome..."
    />
    <button
      (click)="startGame()"
      class="startGame"
      [disabled]="!wizardName || !wizardName.trim()"
    >
      Varca la Soglia 🚪
    </button>
  </div>
</div>
