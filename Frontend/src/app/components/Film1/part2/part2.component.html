<button class="audio-toggle-btn" (click)="toggleAudio()">
  <svg *ngIf="!audioService.isMuted" viewBox="0 0 24 24" class="audio-icon">
    <path
      d="M5 17h3l5 5V2l-5 5H5v10zm11-5c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"
    />
  </svg>

  <svg *ngIf="audioService.isMuted" viewBox="0 0 24 24" class="audio-icon">
    <path
      d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"
    />
  </svg>
</button>
<div class="letter-container" *ngIf="actualFase === 'letter'">
  <img
    src="assets/img/Part2/PrivetDrive_door.png"
    class="door-img"
    alt="Privet door"
  />
  <button
    *ngIf="!letterIsOpen"
    class="open-letter-btn"
    (click)="openLetter()"
  ></button>
  <div
    class="hogwarts-letter-box"
    *ngIf="letterIsOpen"
    [class.is-flipped]="letterIsFlipped"
    (click)="toggleLetterFlip()"
  >
    <div class="letter-card-inner">
      <div class="letter-face front">
        <img
          src="assets/img/Part2/letterFront.png"
          alt="Hogwarts Letter Front"
        />
      </div>

      <div class="letter-face back">
        <img src="assets/img/Part2/letterBack.png" alt="Hogwarts Letter Back" />
      </div>
    </div>
  </div>
</div>
<div class="firePlace-container" *ngIf="actualFase === 'firePlace'">
  <div tabindex="0" class="firePlace-viewport">
    <div class="firePlace-view">
      <img src="assets/img/" class="firePlace-img" alt="FirePlace" />
      <button class="" (click)="nonLoSo()">Prepara le valige</button>
    </div>
  </div>
</div>
<div class="lightHouse-container" *ngIf="actualFase === 'lightHouse'">
  <div class="lightHouse-viewport">
    <div class="lightHouse-view">
      <!--<video
        *ngIf="showlightHouseVideo"
        src="assets/img/Part2/"
        class="fullscreen-video"
        autoplay
        muted
        playsinline
        (ended)="onVideoEnded()"
      ></video>-->
      <img
        *ngIf="!showlightHouseVideo"
        [src]="script[currentLinelightHouse].image"
        class="lightHouse-img"
        alt="lightHouse Scene"
      />
      <div class="door-opened" *ngIf="currentLinelightHouse === 1">
        <img
          src="../../../../assets/img/Part2/lightHouse_Door.png"
          class="door-zoom-img"
          alt="door"
        />
        <button class="interactive-door" *ngIf="currentLinelightHouse === 1 && doorClicks < 6"
        (click)="onDoorClick()"></button>
      </div>
      <div class="dialogue-box">
        <div class="dialog-text">
          <p *ngIf="script[currentLinelightHouse].character">
            {{ script[currentLinelightHouse].character }}
          </p>
          <p>{{ script[currentLinelightHouse].text }}</p>
        </div>
      </div>
      <button class="followHagrid" (click)="followHagrid()">
        followHagrid
      </button>
    </div>
  </div>
</div>
<div class="diagonAlley-container" *ngIf="actualFase === 'diagonAlley'">
  <div class="diagonAlley-viewport">
    <div class="diagonAlley-view">
      <img
        *ngIf="!showVideo"
        [src]="script2[currentLinePub].image"
        class="pub-img"
        alt="Pub Scene"
      />
      <video
        *ngIf="showVideo"
        src="assets/img/Part2/DiagonAlley.mp4"
        class="fullscreen-video"
        autoplay
        muted
        playsinline
        (ended)="onVideoEnded()"
      ></video>
      <div
        class="wall-bricks-container"
        *ngIf="currentLinePub === 5 && !isPubEnigmaSolved"
      >
        <button class="brick-btn btn-0" (click)="onBrickClick(0)"></button>
        <button class="brick-btn btn-1" (click)="onBrickClick(1)"></button>
        <button class="brick-btn btn-2" (click)="onBrickClick(2)"></button>
        <button
          class="brick-btn btn-3"
          [class.pulse-hint]="userPubSequence.length === 0"
          (click)="onBrickClick(3)"
        ></button>
        <button class="brick-btn btn-4" (click)="onBrickClick(4)"></button>
      </div>
      <div class="dialogue-box">
        <div class="dialog-text">
          <p *ngIf="script2[currentLinePub].character">
            {{ script2[currentLinePub].character }}
          </p>
          <p>{{ script2[currentLinePub].text }}</p>
        </div>
      </div>
    </div>
  </div>
</div>
